name: Pipeline Trabalho Final

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 12 * * 1'

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test